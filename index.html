/* ══════════ SHARED STORAGE CONFIG (JSONBin.io) ══════════ */
const CLOUD_SYNC={
  enabled:true,
  provider:"jsonbin",
  binId:"",           // Auto-created on first save
  apiKey:"$2a$10$AntvOTM3iaWorb7sET8Adu.cqTSJZWo0ZA4GgThAr6ik5zKJZf0Lq",
  pollMs:30000,
};

const isCloudEnabled=()=>CLOUD_SYNC.enabled&&CLOUD_SYNC.apiKey&&CLOUD_SYNC.apiKey.length>10;

const loadCloudPayload=async()=>{
  if(!isCloudEnabled()||!CLOUD_SYNC.binId)return null;
  const r=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_SYNC.binId}/latest`,{
    headers:{"X-Master-Key":CLOUD_SYNC.apiKey,"X-Bin-Meta":false}
  });
  if(!r.ok)throw new Error(`JSONBin read failed (HTTP ${r.status})`);
  const data=await r.json();
  if(!data||!Array.isArray(data.interns)||!data.options)return null;
  return data;
};

const saveCloudPayload=async(payload)=>{
  if(!isCloudEnabled())return;
  if(CLOUD_SYNC.binId){
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_SYNC.binId}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":CLOUD_SYNC.apiKey},
      body:JSON.stringify(payload)
    });
    if(!r.ok)throw new Error(`JSONBin update failed (HTTP ${r.status})`);
  }else{
    const r=await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":CLOUD_SYNC.apiKey,
        "X-Bin-Name":"AIInternPortalData","X-Bin-Private":true},
      body:JSON.stringify(payload)
    });
    if(!r.ok)throw new Error(`JSONBin create failed (HTTP ${r.status})`);
    const j=await r.json();
    CLOUD_SYNC.binId=j.metadata.id;
    try{localStorage.setItem("jsonbin-bin-id",j.metadata.id)}catch(e){}
    console.log("JSONBin created — binId:",j.metadata.id,"← save this in CLOUD_SYNC.binId for permanence");
  }
};

// On load, try to restore binId from localStorage if not hardcoded

const pct=(s,e)=>{if(!s||!e)return 0;const t=Math.max(1,Math.ceil((new Date(e)-new Date(s))/864e5));return Math.min(100,Math.round(Math.max(0,Math.ceil((new Date()-new Date(s))/864e5))/t*100))};

// Sortable header component
const SortHeader=({label,field,sortState,onSort,style={}})=>{
  const active=sortState.field===field;
  const arrow=active?(sortState.asc?"▲":"▼"):"⇅";
  return <th onClick={()=>onSort(field)} style={{padding:"10px 10px",textAlign:"left",color:"#E6E6E6",fontSize:10,fontWeight:600,textTransform:"uppercase",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",...style}}>{label} <span style={{fontSize:8,opacity:active?1:0.4,marginLeft:2}}>{arrow}</span></th>;
};

// Sort function
const sortInterns=(list,sortState)=>{
  if(!sortState.field)return list;
  return [...list].sort((a,b)=>{
    let va=a[sortState.field]||"",vb=b[sortState.field]||"";
    if(sortState.field==="startDate"||sortState.field==="endDate"||sortState.field==="goalDueDate"){va=va?new Date(va).getTime():0;vb=vb?new Date(vb).getTime():0}
    else if(sortState.field==="trainingPct"||sortState.field==="readiness"){va=Number(va)||0;vb=Number(vb)||0}
    else if(sortState.field==="daysLeft"){va=dr(a.endDate)||999;vb=dr(b.endDate)||999}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase()}
    if(va<vb)return sortState.asc?-1:1;if(va>vb)return sortState.asc?1:-1;return 0;
  });
};

// Program Health Score — auto-computed from data
const calcHealth=(i)=>{
  let score=0,signals=[];
  const placed=i.assignment&&i.assignment!=="Yet to be placed"&&i.assignment!=="No project assignment";
  if(placed){score++;signals.push({label:"Project Placed",met:true})}else{signals.push({label:"Project Placed",met:false})}
  if(i.mentor){score++;signals.push({label:"Mentor Assigned",met:true})}else{signals.push({label:"Mentor Assigned",met:false})}
  if(i.goal&&i.goal.trim()){score++;signals.push({label:"Goal Defined",met:true})}else{signals.push({label:"Goal Defined",met:false})}
  const lu=(i.weeklyUpdates||[]);const lastUpdate=lu.length>0?lu[lu.length-1]:null;const updateCurrent=lastUpdate&&Math.ceil((new Date()-new Date(lastUpdate.date))/864e5)<=14;
  if(updateCurrent){score++;signals.push({label:"Updates Current",met:true})}else{signals.push({label:"Updates Current",met:false})}
  if(i.trainingPct&&i.trainingPct>=50){score++;signals.push({label:"Training >50%",met:true})}else{signals.push({label:"Training >50%",met:false})}
  if(i.midFeedback==="Y"){score++;signals.push({label:"Feedback Received",met:true})}else{signals.push({label:"Feedback Received",met:false})}
  const level=score>=5?"on-track":score>=3?"needs-attention":score>=1?"intervention":"incomplete";
  return {score,total:6,signals,level};
};

/* ══════════ GENERATE MAILTO ══════════ */
const generateMailto=(intern,options)=>{
  const cfg=options.emailConfig||{};
  const cc=(options.ccEmails||[]).join(",");
  const vars={"{name}":intern.name||"","{startDate}":intern.startDate||"TBD","{location}":intern.location||"TBD","{practice}":intern.practice||"TBD","{assignment}":intern.assignment||"TBD","{templateLink}":cfg.onboardingTemplateLink||"[Link not configured]"};
  let subject=cfg.emailSubject||"Welcome — Onboarding Details";
  let body=cfg.emailBody||"Welcome to the program!";
  Object.entries(vars).forEach(([k,v])=>{subject=subject.split(k).join(v);body=body.split(k).join(v)});
  return `mailto:${encodeURIComponent(intern.email||"")}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
};

  if(type==="intern"){
    const subject=`Bi-Weekly Status Update Due — ${intern.name} | AI & Data Intern Program`;
    const body=`Hi ${intern.name},\n\nTrust you're doing well. This is a reminder to submit your bi-weekly status update.\n\nPlease share an update covering the following:\n\n1. Key tasks completed in the last two weeks:\n2. Training / certification progress:\n3. Blockers or challenges faced:\n4. Plan for next two weeks:\n5. Goal progress update:\n\nKindly respond to this email with your update by end of day tomorrow.\n\nRegards,\nAI & Data Intern Program Team`;
    return `mailto:${encodeURIComponent(intern.email||"")}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  } else {
    const subject=`Feedback Request — ${intern.name} (Intern) | AI & Data Program`;
    const body=`Hi,\n\nTrust you're doing well. We are conducting a bi-weekly check-in for our AI & Data intern program.\n\nCould you kindly share your feedback on ${intern.name} covering the following:\n\n1. Quality of work — delivering independently or needs guidance?\n2. Proactiveness & initiative — goes beyond assigned scope?\n3. Collaboration & team fit\n4. Key strengths and any development areas\n5. Overall trajectory — On Track / Needs Improvement / Exceeding Expectations\n\nA brief response against each point would suffice. This feeds directly into the program review.\n\nRegards,\nAI & Data Intern Program Team\nDeloitte Consulting India`;
    return `mailto:?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }
};

      <div style={{background:"#86BC25",padding:"24px",borderRadius:"12px 12px 0 0",textAlign:"center"}}><div style={{fontSize:36}}>✓</div><div style={{color:"#fff",fontSize:18,fontWeight:700,marginTop:4}}>{fm.name} Added!</div></div>
      <div style={{padding:24}}>

        </div>

};

/* ══════════ MAIN APP ══════════ */
function App(){
  const [interns,setInterns]=useState([]);
  const [options,setOptions]=useState(DEFAULT_OPTIONS);
  const [syncMode,setSyncMode]=useState("local");
  const [syncError,setSyncError]=useState("");
  const [lastSyncedAt,setLastSyncedAt]=useState("");
  const [page,setPage]=useState("overview");
  const [selId,setSelId]=useState(null);
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [sideOpen,setSideOpen]=useState(true);
  const [loaded,setLoaded]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [showChangePin,setShowChangePin]=useState(false);
  const [manageOpt,setManageOpt]=useState(null); // {key,label}
  const [showImport,setShowImport]=useState(null); // "roster"|"goals"|null
  const [showEmailSettings,setShowEmailSettings]=useState(false);
  const [subTab,setSubTab]=useState("faq");
  const [sort,setSort]=useState({field:"",asc:true});
  const hydratedRef=useRef(false);
  const saveDebounceRef=useRef(null);
  const toggleSort=(field)=>setSort(prev=>({field,asc:prev.field===field?!prev.asc:true}));

  useEffect(()=>{try{if(localStorage.getItem(AUTH_KEY)==="admin")setIsAdmin(true)}catch(e){}},[]);
  useEffect(()=>{(async()=>{
    let localInterns=DEFAULT_INTERNS;
    let localOptions=DEFAULT_OPTIONS;
    try{
      const s=localStorage.getItem(SK),o=localStorage.getItem(OK);
      localInterns=s?JSON.parse(s):DEFAULT_INTERNS;
      localOptions=o?JSON.parse(o):DEFAULT_OPTIONS;
    }catch(e){
      localInterns=DEFAULT_INTERNS;
      localOptions=DEFAULT_OPTIONS;
    }

    if(isCloudEnabled()){
      try{
        const cloud=await loadCloudPayload();
        if(cloud){
          setInterns(cloud.interns);
          setOptions(cloud.options);
          setSyncMode("cloud");
          setSyncError("");
          setLastSyncedAt(new Date().toISOString());
        }else{
          setInterns(localInterns);
          setOptions(localOptions);
          await saveCloudPayload({interns:localInterns,options:localOptions});
          setSyncMode("cloud");
          setSyncError("");
          setLastSyncedAt(new Date().toISOString());
        }
      }catch(e){
        setInterns(localInterns);
        setOptions(localOptions);
        setSyncMode("local");
        setSyncError("Cloud storage unavailable. Using local browser storage.");
      }
    }else{
      setInterns(localInterns);
      setOptions(localOptions);
      setSyncMode("local");
    }
    hydratedRef.current=true;
    setLoaded(true);
  })()},[]);

  useEffect(()=>{
    if(!loaded||!hydratedRef.current)return;
    try{
      localStorage.setItem(SK,JSON.stringify(interns));
      localStorage.setItem(OK,JSON.stringify(options));
    }catch(e){}

    if(isCloudEnabled()){
      if(saveDebounceRef.current)clearTimeout(saveDebounceRef.current);
      saveDebounceRef.current=setTimeout(async()=>{
        try{
          await saveCloudPayload({interns,options});
          setSyncMode("cloud");
          setSyncError("");
          setLastSyncedAt(new Date().toISOString());
        }catch(e){
          setSyncMode("local");
          setSyncError("Cloud sync failed. Local save completed.");
        }
      },800);
    }
  },[interns,options,loaded]);

  useEffect(()=>()=>{if(saveDebounceRef.current)clearTimeout(saveDebounceRef.current)},[]);

  useEffect(()=>{
    if(!loaded||!isCloudEnabled())return;
    const id=setInterval(async()=>{
      try{
        const cloud=await loadCloudPayload();
        if(!cloud)return;
        const c=JSON.stringify(cloud),l=JSON.stringify({interns,options});
        if(c!==l){
          setInterns(cloud.interns);
          setOptions(cloud.options);
          setSyncMode("cloud");
          setSyncError("");
          setLastSyncedAt(new Date().toISOString());
        }
      }catch(e){}
    },Math.max(10000,CLOUD_SYNC.pollMs||30000));
    return ()=>clearInterval(id);
  },[loaded,interns,options]);

  const save=u=>{if(!isAdmin)return;setInterns(p=>p.map(i=>i.id===u.id?u:i));setSelId(null)};
  const deleteIntern=(id)=>{if(!isAdmin)return;setInterns(p=>p.filter(i=>i.id!==id));setSelId(null)};
  const add=n=>{if(!isAdmin)return;setInterns(p=>[...p,n]);setShowAdd(false)};
  const reset=()=>{if(!isAdmin)return;if(confirm("Reset ALL data and options?")){setInterns(DEFAULT_INTERNS);setOptions(DEFAULT_OPTIONS);localStorage.removeItem(SK);localStorage.removeItem(OK)}};
  const logout=()=>{setIsAdmin(false);try{localStorage.removeItem(AUTH_KEY)}catch(e){}};
  const exportJSON=()=>{const b=new Blob([JSON.stringify({interns,options},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="intern_portal_data.json";a.click();URL.revokeObjectURL(u)};
  const importJSON=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.interns&&Array.isArray(d.interns)){setInterns(d.interns);if(d.options)setOptions(d.options);alert("Imported!")}else if(Array.isArray(d)){setInterns(d);alert("Imported!")}else alert("Invalid format.")}catch(err){alert("Error.")}};r.readAsText(f)};i.click()};
  const exportCSV=()=>{const h="Name,Email,Location,Start Date,End Date,Assignment,Practice,RAG,Status,Mentor,Conversion Rec,Onboarding,Mid-Feedback,Training %,Readiness,Goal,Goal Due Date,Goal Status,Feedback\n";const rows=interns.map(i=>[i.name,i.email,i.location,i.startDate,i.endDate,i.assignment,i.practice,i.rag,i.status,i.mentor,i.conversionRec,i.onboarding,i.midFeedback,i.trainingPct,i.readiness,i.goal,i.goalDueDate,i.goalStatus,i.feedback].map(v=>`"${(v+"").replace(/"/g,'""')}"`).join(",")).join("\n");const b=new Blob([h+rows],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="intern_data.csv";a.click();URL.revokeObjectURL(u)};
  const saveOption=(key,items)=>{setOptions(p=>({...p,[key]:items}))};

  // CSV Import handlers
  const handleCSVImport=(data,mode)=>{
    if(mode==="roster"){
      const maxId=interns.length?Math.max(...interns.map(i=>i.id)):0;
      const newInterns=data.map((d,idx)=>{
        // Check if intern already exists by name
        const existing=interns.find(i=>i.name.toLowerCase()===((d.name||"").toLowerCase()));
        if(existing){return {...existing,...Object.fromEntries(Object.entries(d).filter(([_,v])=>v!==""&&v!==0&&v!==undefined))}}
        return {...DEFAULT_INTERNS[0],id:maxId+idx+1,...d,weeklyUpdates:[],resumeLink:"",projectWork:"",exitFeedback:"",outlook:"TBD"};
      });
      // Merge: update existing, add new
      const updated=[...interns];
      newInterns.forEach(ni=>{const idx=updated.findIndex(u=>u.name.toLowerCase()===ni.name.toLowerCase());if(idx>=0)updated[idx]={...updated[idx],...Object.fromEntries(Object.entries(ni).filter(([k,v])=>v!==""&&v!==0&&v!==undefined&&k!=="id"))};else updated.push(ni)});
      setInterns(updated);
      alert(`Imported: ${data.length} rows processed.`);
    } else if(mode==="goals"){
      const updated=[...interns];
      data.forEach(d=>{const idx=updated.findIndex(i=>i.name.toLowerCase()===((d.name||"").toLowerCase()));if(idx>=0){if(d.goal)updated[idx].goal=d.goal;if(d.goalDueDate)updated[idx].goalDueDate=d.goalDueDate;if(d.goalStatus)updated[idx].goalStatus=d.goalStatus}});
      setInterns(updated);
      alert(`Goals updated for ${data.length} rows.`);
    }
  };

  const total=interns.length,active=interns.filter(i=>!["Rolled off","Converted to FTE","Data pending"].includes(i.status)).length,converted=interns.filter(i=>i.conversionRec==="Yes").length,pipeline=interns.filter(i=>i.conversionRec==="Yes (Pending)").length,unplaced=interns.filter(i=>i.assignment==="Yet to be placed"||i.assignment==="No project assignment"||!i.assignment).length,redRag=interns.filter(i=>i.rag==="Red").length,goalsSet=interns.filter(i=>i.goal&&i.goal.trim()).length;
  const overdue=interns.filter(i=>{if(["Rolled off","Converted to FTE","Data pending"].includes(i.status))return false;const lu=(i.weeklyUpdates||[]);if(lu.length===0)return true;const last=lu[lu.length-1];return Math.ceil((new Date()-new Date(last.date))/864e5)>14}).length;

  // Auto-generated recommendations for executive view
  const recommendations=useMemo(()=>{
    const r=[];
    interns.forEach(i=>{
      const d=dr(i.endDate);
      if(d!==null&&d>0&&d<=14&&i.status!=="Rolled off"&&i.status!=="Converted to FTE"){
        if(i.assignment==="Yet to be placed"||i.assignment==="No project assignment"||!i.assignment)
          r.push({severity:"critical",text:`${i.name} ends in ${d} days with NO project assignment. Recommend immediate escalation to Arnab (RM) for placement or tenure decision.`,intern:i});
        else if(i.conversionRec==="TBD")
          r.push({severity:"critical",text:`${i.name} ends in ${d} days — conversion decision still pending. Request PM feedback and schedule conversion review with Anil.`,intern:i});
        else if(!i.goal||!i.goal.trim())
          r.push({severity:"high",text:`${i.name} ends in ${d} days without a defined goal. Flag to mentor for immediate goal-setting.`,intern:i});
      } else if(d!==null&&d>14&&d<=30&&i.status!=="Rolled off"&&i.status!=="Converted to FTE"){
        if(i.conversionRec==="TBD")
          r.push({severity:"medium",text:`${i.name} ends in ${d} days — begin conversion evaluation. Collect PM feedback this cycle.`,intern:i});
      }
    });
    if(unplaced>0){const names=interns.filter(i=>(i.assignment==="Yet to be placed"||i.assignment==="No project assignment"||!i.assignment)&&i.status!=="Rolled off"&&i.status!=="Converted to FTE").map(i=>i.name);if(names.length>0&&!r.some(x=>x.severity==="critical"&&x.text.includes("NO project")))r.push({severity:"high",text:`${names.join(", ")} — unplaced. Follow up with Arnab for staffing options.`})}
    if(overdue>0)r.push({severity:"medium",text:`${overdue} intern(s) have not submitted a status update in 14+ days. Trigger bi-weekly feedback collection.`});
    const noGoal=interns.filter(i=>(!i.goal||!i.goal.trim())&&i.status!=="Rolled off"&&i.status!=="Converted to FTE"&&i.status!=="Data pending");
    if(noGoal.length>0)r.push({severity:"medium",text:`${noGoal.map(i=>i.name).join(", ")} — no goals defined. Per Anil's directive, all interns must have planned goals.`});
    const noMentor=interns.filter(i=>!i.mentor&&i.status!=="Rolled off"&&i.status!=="Converted to FTE"&&i.status!=="Data pending");
    if(noMentor.length>0)r.push({severity:"low",text:`${noMentor.map(i=>i.name).join(", ")} — no mentor assigned. Assign from the program team.`});
    return r.sort((a,b)=>{const o={critical:0,high:1,medium:2,low:3};return (o[a.severity]||4)-(o[b.severity]||4)});
  },[interns,unplaced,overdue]);

  const filtered=useMemo(()=>{let d=filter==="All"?interns:filter==="Active"?interns.filter(i=>i.rag!=="Red"&&i.status!=="Rolled off"&&i.status!=="Converted to FTE"):filter==="Unplaced"?interns.filter(i=>i.assignment==="Yet to be placed"||i.assignment==="No project assignment"||!i.assignment):filter==="At Risk"?interns.filter(i=>i.rag==="Red"||i.rag==="Amber"):interns;if(search.trim()){const s=search.toLowerCase();d=d.filter(i=>(i.name+i.email+i.location+i.assignment+i.mentor).toLowerCase().includes(s))}return d},[interns,filter,search]);

  const sel=interns.find(i=>i.id===selId);
  const nid=interns.length?Math.max(...interns.map(i=>i.id))+1:1;
  const locations=useMemo(()=>{const m={};interns.forEach(i=>{if(i.location)m[i.location]=(m[i.location]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[interns]);
  const maxLoc=Math.max(...locations.map(l=>l[1]),1);

  // Managed option button
  const OptBtn=({optKey,label})=>isAdmin?<button onClick={()=>setManageOpt({key:optKey,label})} style={{padding:"3px 10px",background:"#F5F5F5",border:"1px solid #E6E6E6",borderRadius:4,fontSize:10,cursor:"pointer",color:"#555"}}>⚙ Manage {label}</button>:null;

  const NAV=[{id:"overview",icon:"📊",label:"Program Dashboard"},{id:"roster",icon:"👥",label:"Talent Registry"},{id:"goals",icon:"🎯",label:"Development Milestones"},{id:"progress",icon:"📅",label:"Performance Cadence"},{id:"resources",icon:"📚",label:"Program Playbook"}];

  if(!loaded)return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",color:"#555"}}>Loading...</div>;

  return <div style={{display:"flex",flexDirection:"column"}}>
    <div style={{height:4,background:"linear-gradient(90deg,#86BC25,#86EB22,#3FC3EC)",flexShrink:0}}/>
    {/* Header */}
    <div style={{background:"#282728",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button className="no-print" onClick={()=>setSideOpen(!sideOpen)} style={{background:"none",border:"none",color:"#E6E6E6",fontSize:20,cursor:"pointer",lineHeight:1}}>☰</button>
        <div><div style={{color:"#fff",fontSize:17,fontWeight:700}}>AI & Data <span style={{color:"#86EB22",fontStyle:"italic"}}>Talent Development</span> Program</div><div style={{color:"#A0A0A0",fontSize:11,marginTop:1}}>Deloitte Consulting India · {new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div></div>
      </div>
      <div className="no-print" style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,background:isAdmin?"rgba(134,188,37,0.2)":"rgba(255,255,255,0.1)",border:isAdmin?"1px solid #86BC25":"1px solid #555",marginRight:4}}><span style={{fontSize:10}}>{isAdmin?"🔓":"🔒"}</span><span style={{fontSize:11,fontWeight:600,color:isAdmin?"#86EB22":"#A0A0A0"}}>{isAdmin?"Program Manager":"Leadership View"}</span></div>
        <div title={syncError||"Storage mode"} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,background:syncMode==="cloud"?"rgba(0,163,224,0.2)":"rgba(232,163,23,0.2)",border:syncMode==="cloud"?"1px solid #00A3E0":"1px solid #E8A317"}}>
          <span style={{fontSize:10}}>{syncMode==="cloud"?"☁":"💾"}</span>
          <span style={{fontSize:11,fontWeight:600,color:syncMode==="cloud"?"#7FDFFF":"#FFD37A"}}>{syncMode==="cloud"?"Shared Sync":"Local Only"}</span>
          {lastSyncedAt&&<span style={{fontSize:10,color:"#A0A0A0"}}>{fmtDate(lastSyncedAt.slice(0,10))}</span>}
        </div>
        {isAdmin?<>
          <button onClick={()=>setShowAdd(true)} style={{padding:"5px 14px",background:"#86BC25",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add Intern</button>
          <button onClick={exportJSON} style={{padding:"5px 12px",background:"transparent",border:"1px solid #555",borderRadius:6,fontSize:11,color:"#E6E6E6",cursor:"pointer"}}>Export</button>
          <button onClick={exportCSV} style={{padding:"5px 12px",background:"transparent",border:"1px solid #555",borderRadius:6,fontSize:11,color:"#E6E6E6",cursor:"pointer"}}>CSV</button>
          <button onClick={importJSON} style={{padding:"5px 12px",background:"transparent",border:"1px solid #555",borderRadius:6,fontSize:11,color:"#E6E6E6",cursor:"pointer"}}>Import JSON</button>

    <div><div style={{fontSize:13,fontWeight:700,color:isThisWeekFeedback?"#7F4F00":"#005587"}}>{isThisWeekFeedback?"📋 Bi-Weekly Feedback Due This Week":"📅 Next Feedback Cycle"}</div><div style={{fontSize:12,color:isThisWeekFeedback?"#7F4F00":"#005587",marginTop:2}}>{isThisWeekFeedback?"Collect status updates from all active interns by Friday":`Next bi-weekly feedback due: ${feedbackDate.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"})}`}</div></div>

      <button onClick={()=>{const cc=(options.ccEmails||[]).join(",");const sub=encodeURIComponent("Bi-Weekly Intern Feedback Request | AI & Data Program");const body=encodeURIComponent("Hi,\n\nAs part of our bi-weekly intern program review, kindly share your feedback on the interns supporting your project.\n\nFor each intern, please cover:\n1. Quality of work & independence\n2. Proactiveness & initiative\n3. Key strengths and development areas\n4. Overall trajectory (On Track / Needs Improvement / Exceeding)\n\nA brief response would suffice.\n\nRegards,\nAI & Data Intern Program Team");window.open(`mailto:?cc=${cc}&subject=${sub}&body=${body}`)}} style={{padding:"6px 14px",background:"#00A3E0",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>📧 Email Project Managers</button>

        <div style={{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`4px solid ${(ragC[n.rag]||ragC.Amber).b}`}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16,fontWeight:700}}>{n.name}</span><span style={{fontSize:11,padding:"2px 10px",borderRadius:12,background:n.status==="Converted to FTE"?"#E8F5E0":"#F5F5F5",color:n.status==="Converted to FTE"?"#276221":"#888",fontWeight:600}}>{n.status==="Converted to FTE"?"✓ Converted to FTE":"Tenure Completed"}</span></div>
            <div style={{fontSize:12,color:"#888",marginTop:4}}>{n.location} · {n.assignment} · {n.practice||"AI & Data"}</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>{fmtDate(n.startDate)} → {fmtDate(n.endDate)}</div>
          </div>
          <span style={{color:"#86BC25",fontSize:12,fontWeight:600}}>View Profile →</span>
        </div>
        {n.exitFeedback&&<div style={{padding:"12px 18px",background:"#F9F9F9",borderTop:"1px solid #F0F0F0"}}><div style={{fontSize:11,fontWeight:600,color:"#555",textTransform:"uppercase",marginBottom:4}}>Exit Feedback</div><div style={{fontSize:12,color:"#555",lineHeight:1.5,fontStyle:"italic"}}>"{n.exitFeedback}"</div></div>}
        {!n.exitFeedback&&<div style={{padding:"8px 18px",background:"#FFF8E1",borderTop:"1px solid #F0F0F0",fontSize:11,color:"#7F4F00"}}>⚠ Exit feedback not yet captured — click to add via profile</div>}
      </div>)}
    </div>}
  </div>}

  {/* Learning Catalog Sub-tab */}
  {subTab==="learning"&&<div>
    <div style={{background:"#E3F2FD",borderRadius:8,padding:"12px 18px",marginBottom:16,fontSize:12,color:"#005587"}}>📖 Curated learning tracks for AI & Data practitioners. Available via Deloitte University, BeCurious, Udemy for Business, and vendor academies.</div>
    <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Learning Tracks</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320,1fr))",gap:14,marginBottom:24}}>
      {LEARNING_CATALOG.map((t,i)=><div key={i} style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
        <div style={{padding:"10px 16px",background:"#282728",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#86EB22",fontWeight:700,fontSize:13}}>{t.track}</span><span style={{color:"#A0A0A0",fontSize:11}}>{t.courses.length} courses</span></div>
        <div style={{padding:14}}>{t.courses.map((c,ci)=><div key={ci} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"5px 0",borderBottom:ci<t.courses.length-1?"1px solid #F5F5F5":"none"}}><span style={{color:"#86BC25",fontSize:12,marginTop:1}}>▸</span><span style={{fontSize:12,color:"#282728",lineHeight:1.4}}>{c}</span></div>)}</div>
      </div>)}
    </div>
    <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Approved Certifications (Intern / Analyst Level)</div>
    <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:"#282728"}}>{["Vendor","Certification","Level"].map((h,hi)=><th key={hi} style={{padding:"10px 14px",textAlign:"left",color:"#E6E6E6",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
        <tbody>{CERTIFICATIONS.map((c,ci)=><tr key={ci} style={{background:ci%2?"#FAFAFA":"#fff",borderBottom:"1px solid #F0F0F0"}}><td style={{padding:"8px 14px",fontWeight:600}}>{c.vendor}</td><td style={{padding:"8px 14px"}}>{c.cert}</td><td style={{padding:"8px 14px"}}><span style={{background:"#E3F2FD",color:"#005587",borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:600}}>{c.level}</span></td></tr>)}</tbody>
      </table>
    </div>
  </div>}
</>;})()}

      </div>
    </div>
    <div style={{textAlign:"center",padding:"8px 20px",color:"#ccc",fontSize:9,borderTop:"1px solid #E6E6E6",background:"#F5F5F5"}}>AI & Data Talent Development Program · Deloitte Consulting India Pvt. Ltd. · Confidential</div>

    {/* MODALS */}
    {sel&&<InternModal intern={sel} onClose={()=>setSelId(null)} onSave={save} onDelete={deleteIntern} isAdmin={isAdmin} options={options}/>}
    {isAdmin&&showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={add} nid={nid} options={options}/>}
    {showLogin&&<AdminLogin onLogin={()=>{setIsAdmin(true);setShowLogin(false)}} onClose={()=>setShowLogin(false)}/>}
    {showChangePin&&<ChangePinModal onClose={()=>setShowChangePin(false)}/>}
    {manageOpt&&<ManageOptionsModal optKey={manageOpt.key} label={manageOpt.label} options={options} onSave={saveOption} onClose={()=>setManageOpt(null)}/>}
    {showImport&&<CSVImportModal mode={showImport} onImport={handleCSVImport} onClose={()=>setShowImport(null)} options={options}/>}
    {showEmailSettings&&<EmailSettingsModal options={options} onSave={saveOption} onClose={()=>setShowEmailSettings(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
